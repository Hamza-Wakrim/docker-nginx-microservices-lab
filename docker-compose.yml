services:
  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    environment:
      FRONTEND_HOST: frontend
      FRONTEND_PORT: 80
      API_HOST_1: backend-1
      API_PORT_1: 3000
      API_HOST_2: backend-2
      API_PORT_2: 3000
      API_HOST_3: backend-3
      API_PORT_3: 3000
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - frontend
      - backend-1
      - backend-2
      - backend-3
    networks:
      - proxy-net

  frontend:
    build: ./frontend
    container_name: frontend
    networks:
      - proxy-net

  backend-1:
    build: ./backend
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      - postgres
      - redis
    networks:
      - proxy-net
      - backend-net

  backend-2:
    build: ./backend
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      - postgres
      - redis
    networks:
      - proxy-net
      - backend-net

  backend-3:
    build: ./backend
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      - postgres
      - redis
    networks:
      - proxy-net
      - backend-net

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend-net

  redis:
    image: redis:7
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - backend-net

volumes:
  postgres-data:
  redis-data:

networks:
  proxy-net:
  backend-net: